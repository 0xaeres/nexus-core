name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  PYTHON_VERSION: "3.13"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: uv sync --python ${{ env.PYTHON_VERSION }} --all-extras

      - name: Ruff
        run: uv run ruff check nexus tests evals

      - name: Pytest
        run: uv run pytest -q

  ragas-regression:
    runs-on: ubuntu-latest
    needs: lint-and-test
    env:
      DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
    services:
      qdrant:
        image: qdrant/qdrant@sha256:b3063c673f3973877c038eeecc392bad5011f072ee7892b56c9a8e204a3bdea9
        ports: ["6333:6333"]
        options: >-
          --health-cmd "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: uv sync --python ${{ env.PYTHON_VERSION }} --all-extras

      - name: Check RAGAS credentials
        id: ragas_credentials
        run: |
          if [ -n "$DEEPINFRA_API_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "RAGAS regression skipped: DEEPINFRA_API_KEY secret is not configured." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Prepare config
        if: steps.ragas_credentials.outputs.available == 'true'
        run: |
          cp nexus.yaml.example nexus.yaml
          sed -i 's|hierarchy_root: ./skills|hierarchy_root: ./evals/fixtures/skills/seed|' nexus.yaml

      - name: Ingest seed skills
        if: steps.ragas_credentials.outputs.available == 'true'
        run: uv run nexus ingest --product forge --path evals/fixtures/skills/seed --no-enrich

      - name: Run RAGAS eval
        if: steps.ragas_credentials.outputs.available == 'true'
        run: uv run python -m evals.run_ragas --limit 10 --out evals/ci_ragas.json

      - name: Compare to baseline
        if: steps.ragas_credentials.outputs.available == 'true'
        run: |
          python - <<'PY'
          import json, sys, os
          report = json.load(open('evals/ci_ragas.json'))
          current = report['aggregates']['faithfulness']
          baseline_path = 'evals/baseline_faithfulness.txt'
          if os.path.exists(baseline_path):
              baseline = float(open(baseline_path).read().strip())
              drop = baseline - current
              print(f"faithfulness: current={current:.3f}, baseline={baseline:.3f}, drop={drop:+.3f}")
              if drop > 0.05:
                  sys.exit(f"faithfulness regressed by {drop:.3f} (> 0.05 gate)")
          else:
              print(f"no baseline yet; current={current:.3f}")
          PY

      - name: Upload eval report
        if: steps.ragas_credentials.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ragas-report
          path: evals/ci_ragas.json
