name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.13"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: uv sync --python ${{ env.PYTHON_VERSION }} --all-extras

      - name: Ruff
        run: uv run ruff check nexus tests evals

      - name: Pytest
        run: uv run pytest -q

  eval-regression:
    runs-on: ubuntu-latest
    needs: lint-and-test
    env:
      DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
    services:
      qdrant:
        image: qdrant/qdrant@sha256:b3063c673f3973877c038eeecc392bad5011f072ee7892b56c9a8e204a3bdea9
        ports: ["6333:6333"]
        options: >-
          --health-cmd "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6
      falkordb:
        image: falkordb/falkordb:v4.12.4
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli -h 127.0.0.1 -p 6379 PING | grep -q PONG"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: uv sync --python ${{ env.PYTHON_VERSION }} --all-extras

      - name: Check eval credentials
        id: eval_credentials
        run: |
          if [ -n "$DEEPINFRA_API_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Eval regression skipped: DEEPINFRA_API_KEY secret is not configured." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Prepare config
        if: steps.eval_credentials.outputs.available == 'true'
        run: |
          cp nexus.yaml.example nexus.yaml

      - name: Run retrieval eval
        if: steps.eval_credentials.outputs.available == 'true'
        run: uv run nexus eval run --suite retrieval --out-dir artifacts/evals

      - name: Run full LLM eval
        if: >
          steps.eval_credentials.outputs.available == 'true' &&
          (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        run: uv run nexus eval run --suite rag,code --limit 10 --out-dir artifacts/evals

      - name: Compare to baseline
        if: >
          steps.eval_credentials.outputs.available == 'true' &&
          (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        run: |
          python - <<'PY'
          import glob, json, os, sys
          reports = sorted(glob.glob('artifacts/evals/*/rag.json'))
          if not reports:
              sys.exit('no rag eval report found')
          report = json.load(open(reports[-1]))
          current = report['aggregates']['faithfulness']
          baseline_path = 'evals/baseline_faithfulness.txt'
          if os.path.exists(baseline_path):
              baseline = float(open(baseline_path).read().strip())
              drop = baseline - current
              print(f"faithfulness: current={current:.3f}, baseline={baseline:.3f}, drop={drop:+.3f}")
              if drop > 0.05:
                  sys.exit(f"faithfulness regressed by {drop:.3f} (> 0.05 gate)")
          else:
              print(f"no baseline yet; current={current:.3f}")
          PY

      - name: Upload eval report
        if: steps.eval_credentials.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports
          path: artifacts/evals
