name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: uv sync --all-extras

      - name: Ruff
        run: uv run ruff check nexus tests evals

      - name: Pytest
        run: uv run pytest -q

  ragas-regression:
    # Heavy: only on main pushes + PRs labeled `run-evals` to keep CI bills sane.
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'run-evals')
    runs-on: ubuntu-latest
    needs: lint-and-test
    services:
      qdrant:
        image: qdrant/qdrant:v1.12.4
        ports: ["6333:6333"]
        options: >-
          --health-cmd "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: uv sync --all-extras

      - name: Prepare config
        env:
          DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
        run: |
          cp nexus.yaml.example nexus.yaml
          sed -i 's|hierarchy_root: ./skills|hierarchy_root: ./nexus/skills/seed|' nexus.yaml
          sed -i 's|org_library_root: ./org-skills|org_library_root: ./nexus/skills/seed/org|' nexus.yaml

      - name: Run RAGAS eval
        env:
          DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
        run: uv run python -m evals.run_ragas --limit 10 --out evals/ci_ragas.json

      - name: Compare to baseline
        run: |
          python - <<'PY'
          import json, sys, os
          report = json.load(open('evals/ci_ragas.json'))
          current = report['aggregates']['faithfulness']
          baseline_path = 'evals/baseline_faithfulness.txt'
          if os.path.exists(baseline_path):
              baseline = float(open(baseline_path).read().strip())
              drop = baseline - current
              print(f"faithfulness: current={current:.3f}, baseline={baseline:.3f}, drop={drop:+.3f}")
              if drop > 0.05:
                  sys.exit(f"faithfulness regressed by {drop:.3f} (> 0.05 gate)")
          else:
              print(f"no baseline yet; current={current:.3f}")
          PY

      - name: Upload eval report
        uses: actions/upload-artifact@v4
        with:
          name: ragas-report
          path: evals/ci_ragas.json
