name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.13'

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: uv sync --python ${{ env.PYTHON_VERSION }} --all-extras

      - name: Ruff
        run: uv run ruff check anvay tests evals

      - name: Pytest
        run: uv run pytest -q

  eval-regression:
    runs-on: ubuntu-latest
    needs: lint-and-test
    env:
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
    services:
      qdrant:
        image: qdrant/qdrant@sha256:b3063c673f3973877c038eeecc392bad5011f072ee7892b56c9a8e204a3bdea9
        ports: ['6333:6333']
        options: >-
          --health-cmd "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6
      falkordb:
        image: falkordb/falkordb:v4.12.4
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli -h 127.0.0.1 -p 6379 PING | grep -q PONG"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: uv sync --python ${{ env.PYTHON_VERSION }} --all-extras

      - name: Check eval credentials
        id: eval_credentials
        run: |
          if [ -n "$LLM_API_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Eval regression skipped: LLM_API_KEY secret is not configured." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Prepare config
        if: steps.eval_credentials.outputs.available == 'true'
        run: |
          cp anvay.yaml.example anvay.yaml

      - name: Run retrieval eval
        if: steps.eval_credentials.outputs.available == 'true'
        run: |
          uv run anvay eval run --suite retrieval --out-dir artifacts/evals
          uv run anvay eval run --suite retrieval --product synthetic --fixture evals/fixtures/synthetic_project --golden evals/synthetic_queries.jsonl --out-dir artifacts/evals-synthetic

